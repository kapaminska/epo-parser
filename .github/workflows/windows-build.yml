name: Windows Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Build Windows executable
        run: pyinstaller epo-parser.spec --noconfirm

      - name: Log executable size
        shell: pwsh
        run: |
          $sizeBytes = (Get-Item dist/epo-parser.exe).Length
          $sizeMB = [math]::Round($sizeBytes / 1MB, 2)
          Write-Host "epo-parser.exe size: $sizeMB MB ($sizeBytes bytes)"

      - name: Smoke test fixture conversion
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
        run: |
          $tmpdir = New-TemporaryFile | ForEach-Object {
            Remove-Item $_
            New-Item -ItemType Directory -Path $_.FullName
          }
          Copy-Item tests/fixtures/epo-jednostka-nadlesnictwo.xml $tmpdir
          Push-Location $tmpdir
          try {
            & (Join-Path $env:GITHUB_WORKSPACE 'dist\epo-parser.exe')
            if ($LASTEXITCODE -ne 0) {
              Write-Error "epo-parser.exe exited with code $LASTEXITCODE"
              exit $LASTEXITCODE
            }
            $pdfs = Get-ChildItem -Filter *.pdf
            if (-not $pdfs) {
              Write-Error 'No PDF output found'
              exit 1
            }
            if (-not (Test-Path 'epo-konwersja.txt')) {
              Write-Error 'epo-konwersja.txt not found'
              exit 1
            }
            Write-Host "Smoke OK: $($pdfs.Count) PDF(s), summary written"
          } finally {
            Pop-Location
          }

      - name: Package ZIP for distribution
        shell: pwsh
        run: |
          $zipPath = Join-Path $env:GITHUB_WORKSPACE 'dist/epo-parser.zip'
          $files = @(
            (Join-Path $env:GITHUB_WORKSPACE 'dist/epo-parser.exe'),
            (Join-Path $env:GITHUB_WORKSPACE '.github/packaging/INSTRUKCJA.txt')
          )
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path $files -DestinationPath $zipPath -CompressionLevel Optimal
          $zipBytes = (Get-Item $zipPath).Length
          $zipMB = [math]::Round($zipBytes / 1MB, 2)
          Write-Host "epo-parser.zip size: $zipMB MB ($zipBytes bytes)"

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: epo-parser-windows
          path: dist/epo-parser.zip
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: EPO Parser ${{ github.ref_name }}
          body_path: .github/release-body.md
          files: dist/epo-parser.zip
          draft: false
          prerelease: false
