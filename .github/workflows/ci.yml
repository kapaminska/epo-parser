name: CI

"on":
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Build Windows executable
        run: pyinstaller epo-parser.spec --noconfirm

      - name: Smoke test --help
        run: dist/epo-parser.exe --help

      - name: Log executable size
        shell: pwsh
        run: |
          $sizeBytes = (Get-Item dist/epo-parser.exe).Length
          $sizeMB = [math]::Round($sizeBytes / 1MB, 2)
          Write-Host "epo-parser.exe size: $sizeMB MB ($sizeBytes bytes)"

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: epo-parser-windows
          path: dist/epo-parser.exe
          retention-days: 30
